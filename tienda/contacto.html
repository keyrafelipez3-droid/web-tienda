<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Contacto - MODULO</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css"/>
</head>
<body>
<nav class="nav">
  <a href="index.html" class="nav-logo">MODULO</a>
  <div class="nav-links">
    <a href="index.html">Inicio</a>
    <a href="productos.html">Tienda</a>
    <a href="contacto.html" class="active">Contacto</a>
  </div>
  <a href="productos.html" class="nav-cart">Carrito (<span id="cart-count">0</span>)</a>
</nav>

<div class="page-header">
  <h1>Contacto</h1>
  <p>Estamos para ayudarte</p>
</div>

<section class="contact-section">
  <div class="contact-info">
    <h2>Hablemos</h2>
    <p>Respondemos en menos de 24 horas. Sin excepciones.</p>
    <div class="contact-detail">
      <span class="contact-icon">@</span>
      <span>hola@modulo.store</span>
    </div>
    <div class="contact-detail">
      <span class="contact-icon">T</span>
      <span>+54 11 0000-0000</span>
    </div>
    <div class="contact-detail">
      <span class="contact-icon">L</span>
      <span>Buenos Aires, Argentina</span>
    </div>
  </div>

  <div class="contact-form-wrap">
    <div id="form-success" class="form-success hidden">Mensaje enviado correctamente.</div>
    <div class="contact-form" id="contact-form">
      <div class="form-group">
        <label>Nombre</label>
        <input type="text" id="nombre" placeholder="Tu nombre"/>
        <span class="field-error" id="err-nombre"></span>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="tu@email.com"/>
        <span class="field-error" id="err-email"></span>
      </div>
      <div class="form-group">
        <label>Asunto</label>
        <input type="text" id="asunto" placeholder="En que podemos ayudarte?"/>
        <span class="field-error" id="err-asunto"></span>
      </div>
      <div class="form-group">
        <label>Mensaje</label>
        <textarea id="mensaje" rows="5" placeholder="Escribe tu mensaje aqui..."></textarea>
        <span class="field-error" id="err-mensaje"></span>
      </div>
      <button class="btn-primary" onclick="submitForm()">Enviar mensaje</button>
    </div>
  </div>
</section>

<footer class="footer">
  <span class="footer-logo">MODULO</span>
  <p>2025 Todos los derechos reservados</p>
  <div class="footer-links">
    <a href="productos.html">Tienda</a>
    <a href="contacto.html">Contacto</a>
  </div>
</footer>

<script src="js/productos-data.js"></script>
<script src="js/cart.js"></script>
<script src="js/contacto.js"></script>
</body>
</html>
